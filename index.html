<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>DUL® | Official Store</title>
    <style>
        :root {
            --lexus-red: radial-gradient(circle, #8B0000 0%, #1A0000 100%);
            --lexus-blue: radial-gradient(circle, #002366 0%, #00081A 100%);
            --lexus-green: radial-gradient(circle, #1B3022 0%, #050A08 100%);
            --lexus-orange: radial-gradient(circle, #94511A 0%, #301A08 100%);
            --lexus-black: radial-gradient(circle, #121212 0%, #000000 100%);
            --space-bg: radial-gradient(ellipse at bottom, #0D1117 0%, #000000 100%);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: #fff; color: #1a1a1a;
            transition: background 0.8s ease;
            overflow-x: hidden; min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 50px; position: fixed; width: calc(100% - 100px); top: 0; z-index: 1000;
            background: rgba(255,255,255,0.01); backdrop-filter: blur(15px);
        }
        .logo { font-weight: 900; letter-spacing: 8px; font-size: 1.5rem; cursor: pointer; }
        
        /* Сагсны загвар */
        .cart-widget {
            background: #000; color: #fff; padding: 10px 20px; border-radius: 30px;
            font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .cart-widget:hover { transform: scale(1.05); background: #333; }

        header { margin-top: 150px; text-align: center; }
        header h1 { font-size: 3.5rem; font-weight: 100; letter-spacing: 20px; }

        .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; padding: 60px 20px; }

        .card { width: 160px; text-align: center; cursor: pointer; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .card img { width: 100%; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1)); }
        .card.active { transform: scale(1.25); z-index: 50; }

        .info { margin-top: 20px; opacity: 0; transition: 0.5s; }
        .card.active .info { opacity: 1; }

        .order-btn {
            background: none; border: 1px solid currentColor; color: inherit;
            padding: 10px 20px; font-size: 0.6rem; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }

        /* Footer */
        footer {
            position: fixed; bottom: 15px; width: 100%;
            text-align: center; font-size: 0.65rem; letter-spacing: 1px; opacity: 0.6;
            line-height: 1.5;
        }

        /* AI DUL */
        #dul-ai-trigger {
            position: fixed; bottom: 80px; right: 30px; width: 60px; height: 60px;
            background: #1a1a1a; color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10001; font-size: 20px;
        }

        #chat-box {
            position: fixed; bottom: 150px; right: 30px; width: 280px; height: 350px;
            background: #fff; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none; flex-direction: column; z-index: 10000; overflow: hidden; color: #333;
        }
        .chat-header { background: #000; color: #fff; padding: 15px; font-size: 0.8rem; }
        #chat-body { padding: 15px; flex-grow: 1; overflow-y: auto; font-size: 0.8rem; }
        .chat-options { padding: 10px; display: flex; gap: 5px; background: #f9f9f9; }
        .chat-options button { flex: 1; padding: 5px; font-size: 0.6rem; cursor: pointer; }

        .floating-candle { position: absolute; pointer-events: none; animation: drift 20s linear infinite; }
        @keyframes drift { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(var(--mx), var(--my)) rotate(360deg); } }

        body.red-bg { background: var(--lexus-red); color: #fff; }
        body.blue-bg { background: var(--lexus-blue); color: #fff; }
        body.green-bg { background: var(--lexus-green); color: #fff; }
        body.orange-bg { background: var(--lexus-orange); color: #fff; }
        body.black-bg { background: var(--lexus-black); color: #fff; }
        body.space-active { background: var(--space-bg) !important; color: #fff; }
    </style>
</head>
<body id="main">

    <nav>
        <div class="logo" onclick="location.reload()">DUL®</div>
        <div class="cart-widget" onclick="showCart()" id="cart-ui">
            🛒 CART: 0₮
        </div>
    </nav>

    <footer>
        УЛААНБААТАР ХОТ, 1-Р СУРГУУЛЬ | DUL® OFFICIAL<br>
        © 2026 DUL Inc. Created by Zelme
    </footer>

    <header>
        <h1>DUL SHOP</h1>
    </header>

    <div class="container" id="c">
        <div class="card" onclick="select(this, 'red-bg')">
            <img src="red_candle-removebg-preview.png">
            <div class="info"><h3>Infrared</h3><p>2,000₮</p>
                <button class="order-btn" onclick="addToCart('Infrared', 2000)">Add to Cart</button><br>
                <button class="order-btn" onclick="order(event, 'red_candle-removebg-preview.png')">Order Now</button>
            </div>
        </div>
        <div class="card" onclick="select(this, 'blue-bg')">
            <img src="blue_candle-removebg-preview.png">
            <div class="info"><h3>Heat Blue</h3><p>2,000₮</p>
                <button class="order-btn" onclick="addToCart('Heat Blue', 2000)">Add to Cart</button><br>
                <button class="order-btn" onclick="order(event, 'blue_candle-removebg-preview.png')">Order Now</button>
            </div>
        </div>
        <div class="card" onclick="select(this, 'green-bg')">
            <img src="green_candle-removebg-preview.png">
            <div class="info"><h3>Greenslate</h3><p>2,000₮</p>
                <button class="order-btn" onclick="addToCart('Greenslate', 2000)">Add to Cart</button><br>
                <button class="order-btn" onclick="order(event, 'green_candle-removebg-preview.png')">Order Now</button>
            </div>
        </div>
        <div class="card" onclick="select(this, 'orange-bg')">
            <img src="yellow_candle-removebg-preview.png">
            <div class="info"><h3>Solar Flare</h3><p>2,000₮</p>
                <button class="order-btn" onclick="addToCart('Solar Flare', 2000)">Add to Cart</button><br>
                <button class="order-btn" onclick="order(event, 'yellow_candle-removebg-preview.png')">Order Now</button>
            </div>
        </div>
        <div class="card" onclick="select(this, 'black-bg')">
            <img src="black_candle-removebg-preview.png">
            <div class="info"><h3>Obsidian</h3><p>2,000₮</p>
                <button class="order-btn" onclick="addToCart('Obsidian', 2000)">Add to Cart</button><br>
                <button class="order-btn" onclick="order(event, 'black_candle-removebg-preview.png')">Order Now</button>
            </div>
        </div>
    </div>

    <div id="chat-box">
        <div class="chat-header">DUL AI ASSISTANT</div>
        <div id="chat-body">Сайн уу? Би Дөл байна. Танд юугаар туслах вэ?</div>
        <div class="chat-options">
            <button onclick="aiAsk('price')">Үнэ</button>
            <button onclick="aiAsk('cart')">Сагс</button>
        </div>
    </div>
    <div id="dul-ai-trigger" onclick="toggleDul()">🤖</div>

    <script>
        let totalPrice = 0;
        let cartItems = [];
        const b = document.getElementById('main');
        
        function select(el, bg) {
            if(b.classList.contains('space-active')) return;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            b.className = bg;
        }

        function addToCart(name, price) {
            totalPrice += price;
            cartItems.push(name);
            document.getElementById('cart-ui').innerText = `🛒 CART: ${totalPrice.toLocaleString()}₮`;
        }

        function showCart() {
            if(cartItems.length === 0) alert("Сагс хоосон байна.");
            else alert("Таны сагсанд: \n" + cartItems.join(", ") + "\n\nНийт: " + totalPrice.toLocaleString() + "₮");
        }

        function toggleDul() {
            const chat = document.getElementById('chat-box');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }

        function aiAsk(type) {
            const body = document.getElementById('chat-body');
            if(type === 'price') body.innerHTML += `<p><b>Дөл:</b> Сагсны нийт дүн ${totalPrice.toLocaleString()}₮.</p>`;
            if(type === 'cart') body.innerHTML += `<p><b>Дөл:</b> Сагсанд ${cartItems.length} бараа байна.</p>`;
            body.scrollTop = body.scrollHeight;
        }

        function order(e, src) {
            e.stopPropagation();
            b.className = 'space-active';
            document.getElementById('c').style.opacity = '0';
            for (let i = 0; i < 20; i++) {
                let img = document.createElement('img'); img.src = src;
                img.className = 'floating-candle'; 
                img.style.left = Math.random()*100+"vw"; img.style.top = Math.random()*100+"vh";
                img.style.setProperty('--mx', (Math.random()-0.5)*1500+"px");
                img.style.setProperty('--my', (Math.random()-0.5)*1500+"px");
                img.style.width = (40+Math.random()*100)+"px";
                document.body.appendChild(img);
            }
        }
    </script>
</body>
</html>
